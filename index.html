<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <center>

        
    <form action="">
    <label for="name">Full name</label><br>
    <input type="text" placeholder="Enter your Fullname"> <br> <br>

    <label for="phone">Phone Number</label><br>
    <input type="number" placeholder="Enter your phone number"><br><br>

    <label for="email">Email</label><br>
    <input type="text" placeholder="e.g samuel4@gmail.com"><br><br>

    <label for="Password">Password</label><br>
    <input type="Password" placeholder="Enter your Password"><br><br>

    <label for="Age">Date of Birth</label><br>
    <input type="date" placeholder=""><br><br>

    <label for="state">State of Origin</label>
    <select name="" id="">
        <option value="Oyo">Oyo State</option>
        <option value="Osun">Osun State</option>
        <option value="Kwara">Kwara State</option>
        <option value="Ekiti">Ekiti State</option>
        <option value="Lagos">Lagos State</option>
        <option value="Edo">Edo State</option>

    </select>
        <br>

 

        <p>Select your Gender</p>

        <label for="male">Male</label><br>
        <input type="checkbox"><br>

        <label for="female">Female</label>
        <input type="checkbox"><br>

        <label for="others">others</label>
        <input type="checkbox"><br><br>


        <!-- checkbox -->
         <label for="male">Male</label>
         <input type="radio" name="gender"><br>

         <label for="Female">Female</label>
         <input type="radio" name="gender"><br>

         <label for="other">others</label>
         <input type="radio" name="gender"><br>

         <!-- textarea -->
          <label for="textarea"></label>
          <textarea name="" id=""></textarea><br>

        


    <button>Submit</button>

    </form>
    </center>

</html>
